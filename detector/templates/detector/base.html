<!-- detector/templates/detector/base.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpamDetector Pro{% endblock %}</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== ANIMATED GRADIENT BACKGROUND ===== */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(102, 126, 234, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(118, 75, 162, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(240, 147, 251, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 0% 100%, rgba(79, 172, 254, 0.15) 0%, transparent 40%),
                #0a0a1a;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 1; }
            100% { opacity: 1.2; }
        }

        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: orbFloat 15s infinite ease-in-out;
        }

        .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: #667eea;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            width: 600px;
            height: 600px;
            background: #764ba2;
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .orb:nth-child(3) {
            width: 400px;
            height: 400px;
            background: #f093fb;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        .orb:nth-child(4) {
            width: 300px;
            height: 300px;
            background: #4facfe;
            top: 20%;
            right: 10%;
            animation-delay: -3s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(80px, -80px) scale(1.2); }
            50% { transform: translate(-60px, 60px) scale(0.8); }
            75% { transform: translate(60px, 40px) scale(1.1); }
        }

        /* ===== PREMIUM NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1300px;
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 16px 35px;
            z-index: 1000;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar.scrolled {
            top: 0;
            border-radius: 0;
            width: 100%;
            background: rgba(10, 10, 26, 0.98);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
        }

        .nav-logo:hover .nav-logo-icon {
            transform: rotate(-10deg) scale(1.05);
        }

        .nav-logo-text {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradShift 3s ease-in-out infinite;
            letter-spacing: -0.5px;
        }

        .nav-logo-badge {
            font-size: 10px;
            font-weight: 700;
            color: #667eea;
            background: rgba(102, 126, 234, 0.15);
            padding: 2px 10px;
            border-radius: 20px;
            -webkit-text-fill-color: #667eea;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        @keyframes gradShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 8px;
            align-items: center;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 16px;
            position: relative;
            letter-spacing: 0.3px;
        }

        .nav-link i {
            font-size: 16px;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .nav-link:hover i {
            color: #667eea;
            transform: scale(1.1);
        }

        .nav-link.active {
            color: #ffffff;
            background: rgba(102, 126, 234, 0.15);
        }

        .nav-link.active i {
            color: #667eea;
        }

        .nav-link .link-indicator {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            opacity: 0;
            transition: all 0.3s;
        }

        .nav-link:hover .link-indicator,
        .nav-link.active .link-indicator {
            opacity: 1;
            width: 30px;
        }

        .nav-cta {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff !important;
            padding: 10px 24px !important;
            border-radius: 50px !important;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .nav-cta:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .nav-toggle {
            display: none;
            font-size: 28px;
            cursor: pointer;
            color: #ffffff;
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            width: 45px;
            height: 45px;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ===== MAIN ===== */
        main {
            position: relative;
            z-index: 1;
            padding-top: 110px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 25px 50px;
        }

        /* ===== PREMIUM GLASS CARD ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 45px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(102, 126, 234, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 40px 100px rgba(102, 126, 234, 0.1);
            transform: translateY(-5px);
        }

        /* ===== HERO ===== */
        .hero-section {
            text-align: center;
            padding: 20px 0 50px;
        }

        .hero-badge {
            display: inline-block;
            padding: 8px 24px;
            background: rgba(102, 126, 234, 0.12);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: 64px;
            font-weight: 900;
            line-height: 1.08;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #667eea 40%, #764ba2 70%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: gradShift 4s ease-in-out infinite;
            letter-spacing: -2px;
        }

        .hero-subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            max-width: 550px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .hero-subtitle strong {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        /* ===== FORM ===== */
        .form-label {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-label .label-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            top: 20px;
            left: 22px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 20px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within .input-icon {
            color: #667eea;
        }

        textarea {
            width: 100%;
            height: 170px;
            padding: 20px 24px 20px 56px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            transition: all 0.4s;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.1);
            background: rgba(255, 255, 255, 0.06);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 300;
        }

        .char-counter {
            position: absolute;
            bottom: 14px;
            right: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            font-weight: 300;
        }

        .btn-primary {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 22px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: all 0.8s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== LOADER ===== */
        .loader {
            display: none;
            text-align: center;
            padding: 35px;
        }

        .loader.show {
            display: block;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(255, 255, 255, 0.04);
            border-top: 4px solid #667eea;
            border-right: 4px solid #764ba2;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader span {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        /* ===== RESULT ===== */
        .result {
            display: none;
            margin-top: 30px;
            padding: 35px;
            border-radius: 24px;
            animation: resultFade 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .result.show {
            display: block;
        }

        .result.spam {
            background: rgba(239, 68, 68, 0.08);
            border: 2px solid rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.05);
        }

        .result.ham {
            background: rgba(34, 197, 94, 0.08);
            border: 2px solid rgba(34, 197, 94, 0.2);
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.05);
        }

        @keyframes resultFade {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .result-icon {
            font-size: 64px;
            text-align: center;
            margin-bottom: 12px;
        }

        .result h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .result-details {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 18px;
        }

        .result-details p {
            margin: 6px 0;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 300;
            line-height: 1.6;
        }

        .result-details i {
            width: 24px;
            color: #667eea;
        }

        .result-details strong {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }

        /* ===== PROBABILITY ===== */
        .probability-section {
            margin-top: 18px;
        }

        .prob-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            font-weight: 400;
        }

        .prob-item .prob-value {
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .progress-fill {
            height: 100%;
            border-radius: 20px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        /* ===== STATS ===== */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
            margin-top: 35px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 28px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(102, 126, 234, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .stat-card .stat-icon {
            font-size: 34px;
            margin-bottom: 12px;
            display: block;
        }

        .stat-card .stat-number {
            display: block;
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .stat-card .stat-label {
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
            font-weight: 400;
            margin-top: 4px;
            display: block;
        }

        /* ===== HISTORY ===== */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .history-header h1 {
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .history-header h1 i {
            color: #667eea;
            font-size: 30px;
        }

        .btn-danger {
            padding: 12px 28px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 16px;
            color: #ef4444;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.1);
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateX(8px);
            border-color: rgba(255, 255, 255, 0.06);
        }

        .history-item.spam {
            border-left: 5px solid #ef4444;
        }

        .history-item.ham {
            border-left: 5px solid #22c55e;
        }

        .history-icon {
            font-size: 30px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .history-content {
            flex: 1;
            min-width: 0;
        }

        .history-text {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-weight: 400;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .history-meta {
            display: flex;
            gap: 18px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            flex-wrap: wrap;
            align-items: center;
        }

        .history-label {
            padding: 3px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .spam-label {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
        }

        .ham-label {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
        }

        .history-meta i {
            margin-right: 4px;
            color: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: rgba(255, 255, 255, 0.15);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 18px;
            display: block;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 18px;
            font-weight: 300;
        }

        .empty-state .sub-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.1);
            margin-top: 6px;
        }

        /* ===== ABOUT ===== */
        .about-section {
            text-align: center;
        }

        .about-icon {
            font-size: 80px;
            margin-bottom: 22px;
            display: inline-block;
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-18px) scale(1.05); }
        }

        .about-section h1 {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .about-section .about-sub {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            margin-bottom: 8px;
        }

        .about-section .about-desc {
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.9;
            max-width: 650px;
            margin: 0 auto;
            font-weight: 300;
            font-size: 16px;
        }

        .about-section .about-desc strong {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
            margin: 45px 0;
        }

        .feature {
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .feature:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .feature i {
            font-size: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 14px;
            display: block;
        }

        .feature h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .feature p {
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
            font-weight: 300;
            line-height: 1.6;
        }

        .tech-stack {
            margin-top: 35px;
        }

        .tech-stack h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.6);
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .tag {
            padding: 10px 24px;
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.08);
            border-radius: 50px;
            font-size: 13px;
            color: #667eea;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tag:hover {
            background: rgba(102, 126, 234, 0.12);
            transform: scale(1.05);
            border-color: rgba(102, 126, 234, 0.2);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.06);
            font-size: 13px;
            font-weight: 300;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
        }

        footer .footer-heart {
            color: #ef4444;
            display: inline-block;
            animation: heartBeat 1.4s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        footer a {
            color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            transition: all 0.3s;
        }

        footer a:hover {
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .hero-title {
                font-size: 48px;
            }

            .features-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .navbar {
                top: 10px;
                padding: 14px 20px;
                width: 95%;
                border-radius: 20px;
            }

            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 72px;
                left: 0;
                right: 0;
                background: rgba(10, 10, 26, 0.98);
                backdrop-filter: blur(20px);
                padding: 20px;
                gap: 6px;
                border-radius: 0 0 24px 24px;
                border-top: 1px solid rgba(255, 255, 255, 0.04);
            }

            .nav-menu.active {
                display: flex;
            }

            .nav-toggle {
                display: flex;
            }

            .nav-logo-text {
                font-size: 20px;
            }

            .nav-logo-badge {
                display: none;
            }

            .hero-title {
                font-size: 32px;
                letter-spacing: -1px;
            }

            .hero-subtitle {
                font-size: 16px;
            }

            .glass-card {
                padding: 24px 20px;
                border-radius: 24px;
            }

            .stats-section {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .features-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .history-header {
                flex-direction: column;
                align-items: stretch;
            }

            .history-item {
                padding: 16px 18px;
            }

            .result {
                padding: 24px 18px;
            }

            .result h2 {
                font-size: 22px;
            }

            .about-section h1 {
                font-size: 30px;
            }

            .stat-card .stat-number {
                font-size: 32px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 26px;
            }

            .hero-badge {
                font-size: 10px;
                padding: 6px 16px;
            }

            .glass-card {
                padding: 20px 16px;
            }

            textarea {
                padding: 16px 18px 16px 44px;
                font-size: 14px;
            }

            .btn-primary {
                font-size: 16px;
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== Animated Background ===== -->
    <div class="bg-container">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- ===== Premium Navbar ===== -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <div class="nav-logo-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div>
                    <span class="nav-logo-text">SpamDetector</span>
                    <span class="nav-logo-badge">Pro</span>
                </div>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li>
                    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                        <i class="fas fa-home"></i> Home
                        <span class="link-indicator"></span>
                    </a>
                </li>
                <li>
                    <a href="/history/" class="nav-link {% if '/history' in request.path %}active{% endif %}">
                        <i class="fas fa-clock-rotate-left"></i> History
                        <span class="link-indicator"></span>
                    </a>
                </li>
                <li>
                    <a href="/about/" class="nav-link {% if '/about' in request.path %}active{% endif %}">
                        <i class="fas fa-info-circle"></i> About
                        <span class="link-indicator"></span>
                    </a>
                </li>
                <li>
                    <a href="/" class="nav-link nav-cta">
                        <i class="fas fa-rocket"></i> Try Now
                    </a>
                </li>
            </ul>
            <div class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- ===== Main ===== -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- ===== Footer ===== -->
    <footer>
        <p>
            Made with <span class="footer-heart">♥</span> by <a href="#">Kiarash</a>
            • Powered by <a href="#">AI</a> • <span id="year"></span>
        </p>
    </footer>

    <script>
        // ===== Year =====
        document.getElementById('year').textContent = new Date().getFullYear();

        // ===== Navbar Scroll =====
        let lastScroll = 0;
        window.addEventListener('scroll', function() {
            const navbar = document.getElementById('navbar');
            const currentScroll = window.pageYOffset;

            if (currentScroll > 30) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
            lastScroll = currentScroll;
        });

        // ===== Mobile Toggle =====
        document.getElementById('navToggle').addEventListener('click', function() {
            document.getElementById('navMenu').classList.toggle('active');
        });

        // ===== Close menu on link click =====
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function() {
                document.getElementById('navMenu').classList.remove('active');
            });
        });

        // ===== GSAP Animations =====
        document.addEventListener('DOMContentLoaded', function() {
            // Hero Animation
            gsap.from('.hero-section', {
                duration: 1.2,
                y: 80,
                opacity: 0,
                ease: 'power3.out'
            });

            // Card Animation
            gsap.from('.glass-card', {
                duration: 1,
                y: 60,
                opacity: 0,
                delay: 0.3,
                ease: 'power3.out',
                scrollTrigger: {
                    trigger: '.glass-card',
                    start: 'top bottom-=100',
                    toggleActions: 'play none none none'
                }
            });

            // Stats Animation
            gsap.from('.stat-card', {
                duration: 0.9,
                y: 50,
                opacity: 0,
                stagger: 0.15,
                delay: 0.5,
                ease: 'power3.out',
                scrollTrigger: {
                    trigger: '.stats-section',
                    start: 'top bottom-=50',
                    toggleActions: 'play none none none'
                }
            });

            // Mouse follower for orbs
            document.addEventListener('mousemove', function(e) {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;

                document.querySelectorAll('.orb').forEach((orb, i) => {
                    const speed = 30 + i * 15;
                    const moveX = (x - 0.5) * speed;
                    const moveY = (y - 0.5) * speed;
                    gsap.to(orb, {
                        x: moveX,
                        y: moveY,
                        duration: 2,
                        ease: 'power2.out',
                        overwrite: true
                    });
                });
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
