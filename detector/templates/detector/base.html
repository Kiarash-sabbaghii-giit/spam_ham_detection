<!-- detector/templates/detector/base.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpamDetector Pro{% endblock %}</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* ============================================================
           🎨 DESIGN SYSTEM TOKENS
           ============================================================ */

        :root {
            /* Spacing */
            --space-0: 0;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-7: 28px;
            --space-8: 32px;
            --space-9: 36px;
            --space-10: 40px;
            --space-12: 48px;
            --space-14: 56px;
            --space-16: 64px;
            --space-18: 72px;
            --space-20: 80px;

            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --radius-3xl: 28px;
            --radius-4xl: 32px;
            --radius-full: 9999px;

            /* Shadows */
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.35);
            --shadow-xl: 0 16px 60px rgba(0, 0, 0, 0.4);

            /* Colors */
            --color-primary: #667eea;
            --color-primary-hover: #7b8cf0;
            --color-primary-active: #5a6fd6;
            --color-primary-subtle: rgba(102, 126, 234, 0.12);
            --color-accent: #764ba2;

            --color-success: #22c55e;
            --color-success-bg: rgba(34, 197, 94, 0.10);
            --color-success-border: rgba(34, 197, 94, 0.18);

            --color-danger: #ef4444;
            --color-danger-bg: rgba(239, 68, 68, 0.10);
            --color-danger-border: rgba(239, 68, 68, 0.18);

            --color-warning: #f59e0b;
            --color-info: #4facfe;

            /* ===== SURFACES - اصلاح شده ===== */
            --surface-base: #08080f;
            --surface-card: rgba(255, 255, 255, 0.09);      /* ← اصلاح */
            --surface-card-hover: rgba(255, 255, 255, 0.12); /* ← اصلاح */
            --surface-glass: rgba(255, 255, 255, 0.06);
            --surface-glass-hover: rgba(255, 255, 255, 0.10);

            /* Text */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --text-tertiary: rgba(255, 255, 255, 0.55);
            --text-quaternary: rgba(255, 255, 255, 0.30);

            /* ===== BORDERS - اصلاح شده ===== */
            --border-subtle: rgba(255, 255, 255, 0.16); /* ← اصلاح */
            --border-muted: rgba(255, 255, 255, 0.22);   /* ← اصلاح */

            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --text-xs: 11px;
            --text-sm: 13px;
            --text-base: 15px;
            --text-md: 17px;
            --text-lg: 20px;
            --text-xl: 24px;
            --text-2xl: 30px;
            --text-3xl: 38px;
            --text-4xl: 48px;
            --text-5xl: 58px;

            --font-light: 300;
            --font-regular: 400;
            --font-medium: 500;
            --font-semibold: 600;
            --font-bold: 700;
            --font-extrabold: 800;
            --font-black: 900;

            /* Animation */
            --duration-fast: 0.2s;
            --duration-base: 0.3s;
            --duration-slow: 0.5s;
            --ease-default: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ============================================================
           🔥 BASE STYLES
           ============================================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background: var(--surface-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* ============================================================
           🎨 PREMIUM BACKGROUND
           ============================================================ */

        .bg-system {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(102, 126, 234, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 75%, rgba(118, 75, 162, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(240, 147, 251, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 0% 90%, rgba(79, 172, 254, 0.06) 0%, transparent 40%),
                var(--surface-base);
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.20;
            will-change: transform;
        }

        .bg-orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--color-primary);
            top: -120px;
            left: -80px;
            opacity: 0.15;
        }

        .bg-orb:nth-child(2) {
            width: 600px;
            height: 600px;
            background: var(--color-accent);
            bottom: -180px;
            right: -100px;
            opacity: 0.10;
        }

        .bg-orb:nth-child(3) {
            width: 350px;
            height: 350px;
            background: #f093fb;
            top: 45%;
            left: 55%;
            opacity: 0.06;
        }

        .bg-orb:nth-child(4) {
            width: 250px;
            height: 250px;
            background: var(--color-info);
            top: 15%;
            right: 8%;
            opacity: 0.08;
        }

        .bg-system::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
            opacity: 0.10;
            pointer-events: none;
        }

        /* ============================================================
           🧭 NAVIGATION
           ============================================================ */

        .navbar {
            position: fixed;
            top: var(--space-5);
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1320px;
            background: rgba(8, 8, 15, 0.80);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-3xl);
            padding: var(--space-3) var(--space-8);
            z-index: 1000;
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transition: all var(--duration-slow) var(--ease-default);
        }

        .navbar.scrolled {
            top: 0;
            border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
            width: 100%;
            background: rgba(8, 8, 15, 0.95);
            backdrop-filter: blur(40px) saturate(1.5);
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 52px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
            transition: all var(--duration-base) var(--ease-spring);
            flex-shrink: 0;
        }

        .nav-logo:hover .nav-logo-icon {
            transform: rotate(-6deg) scale(1.04);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.25);
        }

        .nav-logo-text {
            font-size: var(--text-lg);
            font-weight: var(--font-extrabold);
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, var(--color-primary) 70%, var(--color-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradientShift 4s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .nav-logo-badge {
            font-size: var(--text-xs);
            font-weight: var(--font-bold);
            color: var(--color-primary);
            background: var(--color-primary-subtle);
            padding: 2px var(--space-3);
            border-radius: var(--radius-full);
            -webkit-text-fill-color: var(--color-primary);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border: 1px solid rgba(102, 126, 234, 0.12);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: var(--space-1);
            align-items: center;
        }

        .nav-link {
            color: var(--text-tertiary);
            text-decoration: none;
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
            transition: all var(--duration-base) var(--ease-default);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            position: relative;
        }

        .nav-link i {
            font-size: 15px;
            transition: all var(--duration-base) var(--ease-default);
            opacity: 0.5;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--surface-glass-hover);
        }

        .nav-link:hover i {
            opacity: 1;
            color: var(--color-primary);
            transform: scale(1.08);
        }

        .nav-link.active {
            color: var(--text-primary);
            background: var(--color-primary-subtle);
        }

        .nav-link.active i {
            opacity: 1;
            color: var(--color-primary);
        }

        .nav-link .link-indicator {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 24px;
            height: 2.5px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            border-radius: var(--radius-full);
            transition: all var(--duration-base) var(--ease-default);
            transform-origin: center;
            opacity: 0;
        }

        .nav-link:hover .link-indicator,
        .nav-link.active .link-indicator {
            transform: translateX(-50%) scaleX(1);
            opacity: 1;
        }

        .nav-cta {
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent)) !important;
            color: #ffffff !important;
            padding: var(--space-2) var(--space-5) !important;
            border-radius: var(--radius-full) !important;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
            font-weight: var(--font-semibold) !important;
        }

        .nav-cta i {
            opacity: 1 !important;
            color: #ffffff !important;
        }

        .nav-cta:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.25) !important;
        }

        .nav-toggle {
            display: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-tertiary);
            padding: var(--space-2);
            background: var(--surface-glass);
            border-radius: var(--radius-md);
            width: 42px;
            height: 42px;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-subtle);
            transition: all var(--duration-base) var(--ease-default);
        }

        .nav-toggle:hover {
            background: var(--surface-glass-hover);
            color: var(--text-primary);
        }

        /* ============================================================
           📐 LAYOUT
           ============================================================ */

        main {
            position: relative;
            z-index: 1;
            padding-top: 100px;
            min-height: 100vh;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 0 var(--space-7) var(--space-12);
        }

        /* ============================================================
           🃏 GLASS CARDS - اصلاح شده
           ============================================================ */

        .glass-card {
            background: var(--surface-card);
            backdrop-filter: blur(32px) saturate(1.3);
            -webkit-backdrop-filter: blur(32px) saturate(1.3);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-4xl);
            padding: var(--space-12) var(--space-10);
            box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.02);
            transition: all var(--duration-slow) var(--ease-default);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 20% 15%, rgba(102, 126, 234, 0.05) 0%, transparent 55%);
            pointer-events: none;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 30%;
            right: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            pointer-events: none;
        }

        .glass-card:hover {
            border-color: var(--border-muted);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transform: translateY(-3px);
        }

        /* ============================================================
           🎯 HERO
           ============================================================ */

        .hero-section {
            text-align: center;
            padding: var(--space-4) 0 var(--space-12);
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-5);
            background: var(--color-primary-subtle);
            border: 1px solid rgba(102, 126, 234, 0.10);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: var(--font-semibold);
            color: var(--color-primary);
            margin-bottom: var(--space-7);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .hero-badge:hover {
            background: rgba(102, 126, 234, 0.12);
            border-color: rgba(102, 126, 234, 0.15);
            transform: translateY(-1px);
        }

        .hero-title {
            font-size: var(--text-5xl);
            font-weight: var(--font-black);
            line-height: 1.06;
            margin-bottom: var(--space-4);
            letter-spacing: -2.5px;
            background: linear-gradient(135deg, #ffffff 0%, var(--color-primary) 35%, var(--color-accent) 65%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: gradientShift 5s ease-in-out infinite;
        }

        .hero-subtitle {
            font-size: var(--text-md);
            color: var(--text-tertiary);
            font-weight: var(--font-regular);
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .hero-subtitle strong {
            color: var(--text-secondary);
            font-weight: var(--font-semibold);
        }

        /* ============================================================
           📝 FORMS
           ============================================================ */

        .form-label {
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-3);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            color: var(--text-secondary);
            letter-spacing: -0.2px;
        }

        .form-label .label-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 16px rgba(34, 197, 94, 0.10);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: var(--space-5);
            transform: translateY(-50%);
            color: var(--text-quaternary);
            font-size: 18px;
            transition: all var(--duration-base) var(--ease-default);
            pointer-events: none;
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--color-primary);
            transform: translateY(-50%) scale(1.05);
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: var(--space-4) var(--space-6) var(--space-4) var(--space-12);
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            color: var(--text-primary);
            font-size: var(--text-base);
            font-family: var(--font-family);
            font-weight: var(--font-regular);
            resize: vertical;
            transition: all var(--duration-base) var(--ease-default);
            line-height: 1.7;
            letter-spacing: 0.1px;
        }

        textarea:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.30);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.03), 0 0 40px rgba(102, 126, 234, 0.02);
        }

        textarea::placeholder {
            color: var(--text-quaternary);
            font-weight: var(--font-light);
        }

        .char-counter {
            position: absolute;
            bottom: var(--space-3);
            right: var(--space-5);
            color: var(--text-quaternary);
            font-size: var(--text-xs);
            font-weight: var(--font-regular);
            transition: color var(--duration-base) var(--ease-default);
        }

        .input-wrapper:focus-within .char-counter {
            color: var(--text-tertiary);
        }

        /* ============================================================
           🔘 BUTTONS
           ============================================================ */

        .btn-primary {
            width: 100%;
            padding: var(--space-4) var(--space-6);
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-active));
            border: none;
            border-radius: var(--radius-xl);
            color: #ffffff;
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            cursor: pointer;
            margin-top: var(--space-5);
            transition: all var(--duration-base) var(--ease-default);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(102, 126, 234, 0.12);
            letter-spacing: 0.2px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: all 0.7s var(--ease-default);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(102, 126, 234, 0.20);
            background: linear-gradient(135deg, #7b8cf0, #5a6fd6);
        }

        .btn-primary:active {
            transform: translateY(-1px) scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary i {
            transition: transform var(--duration-base) var(--ease-default);
        }

        .btn-primary:hover i {
            transform: translateX(2px) scale(1.05);
        }

        /* ============================================================
           ⏳ LOADER
           ============================================================ */

        .loader {
            display: none;
            text-align: center;
            padding: var(--space-8);
        }

        .loader.show {
            display: block;
            animation: fadeIn var(--duration-slow) var(--ease-default);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 2.5px solid var(--border-subtle);
            border-top: 2.5px solid var(--color-primary);
            border-right: 2.5px solid var(--color-accent);
            border-radius: 50%;
            animation: spin 0.7s var(--ease-default) infinite;
            margin: 0 auto var(--space-4);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader span {
            color: var(--text-tertiary);
            font-weight: var(--font-regular);
            font-size: var(--text-sm);
            letter-spacing: 0.3px;
        }

        /* ============================================================
           📊 RESULT
           ============================================================ */

        .result {
            display: none;
            margin-top: var(--space-7);
            padding: var(--space-8) var(--space-9);
            border-radius: var(--radius-2xl);
            animation: resultReveal var(--duration-slow) var(--ease-spring);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(16px);
            border: 1.5px solid var(--border-subtle);
        }

        .result.show {
            display: block;
        }

        .result.spam {
            background: var(--color-danger-bg);
            border-color: var(--color-danger-border);
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.03);
        }

        .result.ham {
            background: var(--color-success-bg);
            border-color: var(--color-success-border);
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.03);
        }

        @keyframes resultReveal {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);

        .result-header {
            display: flex;
            align-items: center;
            gap: var(--space-4);

        .detail-label {

            font-weight: var(--font-medium);

            color: var(--text-quaternary);
            margin-right: var(--space-1);

            word-break: break-word;
            font-weight: var(--font-regular);
        }

        .probability-labels {
            display: flex;
            justify-content: space-between;
            font-size: var(--text-sm);
            color: var(--text-tertiary);
            margin-bottom: var(--space-1);
        }

        .prob-item .prob-value {
            font-weight: var(--font-semibold);
            color: var(--text-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border-subtle);
            border-radius: var(--radius-full);
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.15);
        }

        .progress-fill {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 1.2s var(--ease-default);
            background: linear-gradient(90deg, var(--color-success), var(--color-warning), var(--color-danger));

        }

        .probability-indicator {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-top: var(--space-2);
            font-size: var(--text-xs);
            color: var(--text-quaternary);
            letter-spacing: 0.3px;
        }

        .probability-indicator span:first-child {
            color: var(--color-primary);

        }

        .result-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--space-4);
            padding-top: var(--space-3);
            border-top: 1px solid var(--border-subtle);
        }

        .result-timestamp {
            font-size: var(--text-xs);
            color: var(--text-quaternary);
        }

        .btn-clear-result {
            background: rgba(255, 255, 255, 0.03);

        .stats-section {

        .stat-card {

            position: relative;
            overflow: hidden;

        .stat-card::before {

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            font-weight: var(--font-regular);
            margin-top: var(--space-1);

            letter-spacing: 0.3px;

        /* ============================================================
           📜 HISTORY - اصلاح شده
           ============================================================ */

        .history-header {

            gap: var(--space-3);

        .history-header h1 {

        /* ===== HISTORY META - اصلاح شده ===== */
        .history-meta {

        .history-label {

        .spam-label {
            background: rgba(239, 68, 68, 0.18);

        }

        .ham-label {
            background: rgba(34, 197, 94, 0.18);
            color: rgba(34, 197, 94, 0.85);
        }

        .history-meta i {
            margin-right: var(--space-1);
            color: var(--text-quaternary);
        }

           🏜️ EMPTY STATE
           ============================================================ */

        .empty-state {
            text-align: center;
            padding: var(--space-16) var(--space-6) var(--space-14);

        }

        .empty-state i {
            font-size: 56px;
            margin-bottom: var(--space-4);

            font-size: var(--text-sm);

            margin-top: var(--space-1);

           ============================================================ */

        .about-section {
            text-align: center;

        .about-icon {

        @keyframes floatIcon {

        .about-section h1 {
            font-size: var(--text-2xl);
            font-weight: var(--font-extrabold);
            margin-bottom: var(--space-2);
            letter-spacing: -1.2px;
            background: linear-gradient(135deg, #ffffff, var(--color-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== ABOUT SUB - اصلاح شده ===== */
        .about-section .about-sub {
            font-size: var(--text-md);
            color: rgba(255, 255, 255, 0.75);  /* ← اصلاح */
            font-weight: var(--font-regular);
            margin-bottom: var(--space-2);
        }

        /* ===== ABOUT DESC - اصلاح شده ===== */
        .about-section .about-desc {
            color: rgba(255, 255, 255, 0.86);  /* ← اصلاح */

            max-width: 620px;
            margin: 0 auto;
            font-weight: var(--font-regular);
            font-size: var(--text-base);
        }

        .about-section .about-desc strong {
            color: rgba(255, 255, 255, 0.95);
            font-weight: var(--font-semibold);
        }

        /* ===== ABOUT STATS - اصلاح شده ===== */
        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-4);
            margin: var(--space-8) 0 var(--space-6);
            padding: var(--space-6);
            background: rgba(20, 22, 32, 0.75);  /* ← اصلاح */
            border: 1px solid rgba(255, 255, 255, 0.18);  /* ← اصلاح */
            border-radius: var(--radius-2xl);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .about-stat {
            text-align: center;
        }

        .about-stat-number {
            display: block;
            font-size: var(--text-2xl);
            font-weight: var(--font-extrabold);
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .about-stat-label {
            display: block;
            font-size: var(--text-sm);
            color: rgba(255, 255, 255, 0.55);
            margin-top: var(--space-1);
            font-weight: var(--font-regular);
        }

        /* ============================================================
           🔧 FEATURES - اصلاح شده
           ============================================================ */

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-5);
            margin: var(--space-10) 0 var(--space-8);

        /* ===== FEATURE CARD - اصلاح شده ===== */
        .feature {
            padding: var(--space-7) var(--space-5) var(--space-6);
            background: rgba(22, 24, 35, 0.72);  /* ← اصلاح */
            border: 1px solid rgba(255, 255, 255, 0.18); /* ← اصلاح */
            border-radius: var(--radius-xl);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all var(--duration-base) var(--ease-default);

        .feature:hover {
            background: rgba(22, 24, 35, 0.85);
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);

        .feature i {
            font-size: 34px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));

            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-3);
            display: block;
            transition: transform var(--duration-base) var(--ease-default);

        .feature:hover i {
            transform: scale(1.05);

        .feature h3 {
            font-size: var(--text-md);
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-1);

            font-size: var(--text-sm);
            font-weight: var(--font-light);
            line-height: 1.6;

           🏷️ TECH TAGS
           ============================================================ */

        .tech-stack {
            margin-top: var(--space-7);

        .tech-stack h3 {

            font-weight: var(--font-medium);

            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            color: rgba(102, 126, 234, 0.5);
            font-weight: var(--font-medium);
            transition: all var(--duration-base) var(--ease-default);

        .tag:hover {
            background: rgba(102, 126, 234, 0.09);
            border-color: rgba(102, 126, 234, 0.12);
            color: rgba(102, 126, 234, 0.7);
            transform: translateY(-2px);

        /* ============================================================
           📎 FOOTER
           ============================================================ */

        footer {
            text-align: center;
            padding: var(--space-9) var(--space-5) var(--space-7);
            color: var(--text-quaternary);
            font-size: var(--text-sm);
            font-weight: var(--font-regular);

            z-index: 1;
            letter-spacing: 0.3px;

            transition: color var(--duration-base) var(--ease-default);
        }

        footer:hover .footer-heart {
            color: rgba(239, 68, 68, 0.5);
        }

        footer a {
            color: var(--text-quaternary);
            text-decoration: none;
            transition: color var(--duration-base) var(--ease-default);
        }

        footer a:hover {
            color: var(--text-tertiary);

           📱 RESPONSIVE
           ============================================================ */

        @media (max-width: 1024px) {

        @media (max-width: 480px) {

           ============================================================ */

        @media (prefers-reduced-motion: reduce) {
            *,

            *::after {

                transition-duration: 0.01ms !important;

            .hero-title,

                animation: none !important;
            }

            .glass-card:hover,
            .stat-card:hover,
            .feature:hover,
            .history-item:hover {

</head>

                </li>
                <li role="none">
                    <a href="/history/" class="nav-link {% if '/history' in request.path %}active{% endif %}" role="menuitem">
                        <i class="fas fa-clock-rotate-left"></i> History
                        <span class="link-indicator"></span>
                    </a>
                </li>
                <li role="none">
                    <a href="/about/" class="nav-link {% if '/about' in request.path %}active{% endif %}" role="menuitem">
                        <i class="fas fa-info-circle"></i> About
                        <span class="link-indicator"></span>
                    </a>
                </li>
                <li role="none">
                    <a href="/" class="nav-link nav-cta" role="menuitem">
                        <i class="fas fa-rocket"></i> Try Now
                    </a>
                </li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- ===== Main Content ===== -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- ===== Footer ===== -->
    <footer>
        <p>
            Made with <span class="footer-heart">♥</span> by <a href="#">Kiarash</a>
            • Powered by <a href="#">AI</a> • <span id="year"></span>
        </p>
    </footer>

    <script>
        (function() {
            'use strict';

            document.getElementById('year').textContent = new Date().getFullYear();

            const navbar = document.getElementById('navbar');
            const navToggle = document.getElementById('navToggle');
            const navMenu = document.getElementById('navMenu');
            let ticking = false;

            window.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(function() {
                        if (window.pageYOffset > 30) {
                            navbar.classList.add('scrolled');
                        } else {
                            navbar.classList.remove('scrolled');
                        }
                        ticking = false;
                    });
                    ticking = true;
                }
            }, { passive: true });

            navToggle.addEventListener('click', function() {
                const isOpen = navMenu.classList.toggle('active');
                this.setAttribute('aria-expanded', isOpen);
                const icon = this.querySelector('i');
                icon.classList.toggle('fa-bars');
                icon.classList.toggle('fa-xmark');
            });

            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function() {
                    navMenu.classList.remove('active');
                    navToggle.setAttribute('aria-expanded', 'false');
                    const icon = navToggle.querySelector('i');
                    icon.classList.add('fa-bars');
                    icon.classList.remove('fa-xmark');
                });
            });

            document.addEventListener('DOMContentLoaded', function() {
                gsap.from('.hero-section', {
                    duration: 0.8,
                    y: 40,
                    opacity: 0,
                    ease: 'power3.out'
                });

                gsap.from('.glass-card', {
                    duration: 0.8,
                    y: 30,
                    opacity: 0,
                    delay: 0.1,
                    ease: 'power3.out',
                    scrollTrigger: {
                        trigger: '.glass-card',
                        start: 'top bottom-=80',
                        toggleActions: 'play none none none'
                    }
                });

                gsap.from('.stat-card', {
                    duration: 0.6,
                    y: 20,
                    opacity: 0,
                    stagger: 0.06,
                    delay: 0.2,
                    ease: 'power3.out',
                    scrollTrigger: {
                        trigger: '.stats-section',
                        start: 'top bottom-=60',
                        toggleActions: 'play none none none'
                    }
                });

                const orbs = document.querySelectorAll('.bg-orb');
                let orbFrame = false;

                document.addEventListener('mousemove', function(e) {
                    if (!orbFrame) {
                        window.requestAnimationFrame(function() {
                            const x = e.clientX / window.innerWidth;
                            const y = e.clientY / window.innerHeight;

                            orbs.forEach((orb, i) => {
                                const speed = 12 + i * 4;
                                const moveX = (x - 0.5) * speed;
                                const moveY = (y - 0.5) * speed;

                                gsap.to(orb, {
                                    x: moveX,
                                    y: moveY,
                                    duration: 2,
                                    ease: 'power2.out',
                                    overwrite: 'auto'
                                });
                            });

                            orbFrame = false;
                        });
                        orbFrame = true;
                    }
                }, { passive: true });
            });

        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
